<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Boop Blast</title>
<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none;}
  html,body{margin:0;height:100%;overflow:hidden;background:#0a1530;
    font-family:-apple-system,"Segoe UI",Roboto,system-ui,sans-serif;color:#fff;}
  #app{position:fixed;inset:0;}
  .screen{position:absolute;inset:0;display:none;}
  .screen.on{display:block;animation:scrIn .26s ease both;}
  @keyframes scrIn{from{opacity:0;transform:scale(1.03);}to{opacity:1;transform:scale(1);}}

  /* =================== HOME =================== */
  #home{background:
    radial-gradient(120% 75% at 50% 88%, #5a47a8 0%, #322668 46%, #221a4e 100%);}
  /* estrelas de fundo (fixas, piscando) */
  #gears{position:absolute;inset:0;pointer-events:none;}
  .star{animation:twinkle 3s ease-in-out infinite both;}
  @keyframes twinkle{0%,100%{opacity:.16}50%{opacity:var(--o,.8)}}

  #map{position:absolute;left:0;right:0;top:0;bottom:0;overflow-y:auto;-webkit-overflow-scrolling:touch;}
  #mapinner{position:relative;width:100%;}
  #road{position:absolute;left:0;top:0;width:100%;}
  .node{position:absolute;transform:translate(-50%,-50%);width:48px;height:52px;cursor:pointer;}
  .node .base{position:absolute;left:50%;top:53%;transform:translate(-50%,-50%);width:46px;height:46px;border-radius:50%;
    background:radial-gradient(circle at 50% 42%,#f4f1ff,#dbd5f1);box-shadow:0 4px 6px rgba(16,9,42,.5);}
  .node .socket{position:absolute;left:50%;top:45%;transform:translate(-50%,-50%);width:41px;height:41px;border-radius:50%;
    background:radial-gradient(circle at 50% 28%,#cdd3df 0%,#9aa3b5 36%,#6c7594 76%,#525b78 100%);
    box-shadow:inset 0 -5px 7px rgba(16,20,46,.5),inset 0 4px 6px rgba(255,255,255,.6),0 1px 2px rgba(0,0,0,.25);}
  .node.done .socket{background:radial-gradient(circle at 50% 28%,#9ee870 0%,#54bd34 42%,#2c9415 80%,#1c7a0e 100%);
    box-shadow:inset 0 -5px 7px rgba(0,52,0,.45),inset 0 4px 6px rgba(255,255,255,.6),0 1px 2px rgba(0,0,0,.25);}
  .node.next .socket{background:radial-gradient(circle at 50% 28%,#a6f37e 0%,#5cc23e 40%,#2aa015 78%,#1b8210 100%);
    box-shadow:inset 0 -5px 7px rgba(0,52,0,.45),inset 0 4px 6px rgba(255,255,255,.6),0 0 0 3px rgba(255,255,255,.2),0 0 16px rgba(120,240,90,.7);}
  .node .lvtxt{position:absolute;left:50%;top:45%;transform:translate(-50%,-50%);z-index:2;font-weight:900;font-size:16px;color:#fff;
    text-shadow:0 1px 2px rgba(0,0,0,.45);pointer-events:none;}
  .node.locked .lvtxt{opacity:.92;}
  /* avatar mascote no nó atual */
  #avatar{position:absolute;transform:translate(-50%,-140%);z-index:5;width:72px;height:78px;pointer-events:none;
    transition:left .5s cubic-bezier(.4,1.4,.5,1),top .5s cubic-bezier(.4,1.4,.5,1);}
  #avatar .ring{position:absolute;left:50%;bottom:-2px;transform:translateX(-50%);width:60px;height:20px;
    border-radius:50%;background:radial-gradient(closest-side,rgba(225,60,210,.9),rgba(225,60,210,0));}
  .gift{position:absolute;transform:translate(-50%,-60%);z-index:4;width:64px;height:64px;animation:bob 2.4s ease-in-out infinite;}
  @keyframes bob{50%{transform:translate(-50%,-72%);}}
  @keyframes float{50%{transform:translate(-50%,-90%) translateY(-6px);}}
  #avatar{animation:none;}

  /* HUD topo */
  #topbar{position:absolute;left:0;right:0;top:0;z-index:8;display:flex;justify-content:space-between;
    align-items:flex-start;padding:calc(env(safe-area-inset-top) + 8px) 12px 0;pointer-events:none;}
  .pill{pointer-events:auto;position:relative;display:inline-flex;align-items:center;height:34px;
    background:linear-gradient(180deg,#162e73,#081a4d);border-radius:17px;border:2px solid #071744;
    box-shadow:0 2px 0 #031033,inset 0 2px 0 rgba(255,255,255,.25);}
  #coinPill{padding:0 22px 0 27px;}
  #livesPill{padding:0 11px 0 27px;}
  .pill .v{position:relative;z-index:1;font-weight:900;font-size:15px;color:#fff;letter-spacing:.5px;text-shadow:0 2px 2px rgba(0,0,0,.45);}
  .pill .coin{position:absolute;left:-8px;top:50%;transform:translateY(-50%);width:30px;height:30px;border-radius:50%;
    background:radial-gradient(circle at 35% 25%,#fff2b2,#ffd35e 25%,#f2a229 60%,#b56b14);
    box-shadow:0 5px 9px rgba(0,0,0,.35),inset 0 4px 0 rgba(255,255,255,.5);}
  .pill .plus{position:absolute;right:-9px;top:50%;transform:translateY(-50%);width:28px;height:28px;border-radius:50%;
    background:radial-gradient(circle at 35% 25%,#7ee9ff,#1e9ce8 55%,#1262b2);
    box-shadow:0 5px 9px rgba(0,0,0,.35),inset 0 3px 0 rgba(255,255,255,.5);cursor:pointer;}
  .pill .plus:before,.pill .plus:after{content:"";position:absolute;background:#fff;left:50%;top:50%;transform:translate(-50%,-50%);border-radius:3px;}
  .pill .plus:before{width:13px;height:4px;}
  .pill .plus:after{width:4px;height:13px;}
  .pill .heart{position:absolute;left:-8px;top:50%;transform:translateY(-50%);width:30px;height:30px;filter:drop-shadow(0 3px 4px rgba(0,0,0,.4));}
  .pill .heart:before,.pill .heart:after{content:"";position:absolute;width:16px;height:25px;background:linear-gradient(#ff6cab,#df1f67);border-radius:16px 16px 0 0;}
  .pill .heart:before{left:15px;transform:rotate(-45deg);transform-origin:0 100%;}
  .pill .heart:after{left:0;transform:rotate(45deg);transform-origin:100% 100%;}
  .pill .heart .num{position:absolute;z-index:2;left:0;right:0;top:5px;text-align:center;color:#fff;font-size:11px;font-weight:900;text-shadow:0 1px 2px rgba(0,0,0,.45);}
  #splash{position:fixed;inset:0;z-index:200;overflow:hidden;background:#190d39;transition:opacity .55s ease;}
  #splash.hide{opacity:0;pointer-events:none;}
  .sp-art{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center;display:block;}
  .sp-barwrap{position:absolute;left:50%;transform:translateX(-50%);bottom:calc(4.5vh + env(safe-area-inset-bottom));
    width:min(84vw,400px);padding:7px;border-radius:26px;background:linear-gradient(#a458e6,#7a2fc4 58%,#5d1fa0);
    border:2px solid #39146e;box-shadow:0 9px 18px rgba(0,0,0,.5),inset 0 3px 0 rgba(255,255,255,.3),inset 0 -5px 8px rgba(0,0,0,.35);}
  .sp-track{position:relative;height:38px;border-radius:999px;overflow:hidden;background:linear-gradient(#251539,#150a29);box-shadow:inset 0 3px 7px rgba(0,0,0,.7);}
  .sp-bar{position:absolute;left:0;top:0;height:100%;width:0%;border-radius:999px;background:linear-gradient(#a6e84a,#6fc220 58%,#54a410);box-shadow:inset 0 3px 0 rgba(255,255,255,.5),inset 0 -5px 7px rgba(0,0,0,.22);transition:width .14s linear;}
  .sp-bar::after{content:"";position:absolute;inset:0;border-radius:999px;background:repeating-linear-gradient(125deg,rgba(255,255,255,.16) 0 13px,transparent 13px 30px);}
  .sp-pct{position:absolute;top:0;right:16px;height:100%;display:flex;align-items:center;font-weight:800;font-size:clamp(16px,5vw,21px);color:#fff;letter-spacing:.5px;z-index:2;text-shadow:0 2px 3px rgba(0,0,0,.65);}
  #gear{pointer-events:auto;width:42px;height:42px;border-radius:50%;background:linear-gradient(180deg,#2c4170,#162a52);
    border:1px solid rgba(150,180,240,.4);display:flex;align-items:center;justify-content:center;box-shadow:0 4px 10px rgba(0,0,0,.42),inset 0 1px 0 rgba(255,255,255,.2);}

  /* trilhos laterais */
  .rail{position:absolute;z-index:7;display:flex;flex-direction:column;gap:14px;top:74px;}
  .rail.left{left:10px;} .rail.right{right:10px;align-items:center;}
  .railbtn{width:70px;display:flex;flex-direction:column;align-items:center;gap:3px;pointer-events:auto;}
  .railbtn .disc{width:64px;height:64px;border-radius:50%;background:linear-gradient(#3a5db0,#22305f);
    border:2px solid #6f8fd6;display:flex;align-items:center;justify-content:center;
    box-shadow:0 4px 8px rgba(0,0,0,.35),inset 0 2px 3px rgba(255,255,255,.2);}
  .railbtn .tag{font-size:11px;font-weight:900;letter-spacing:.3px;padding:2px 8px;border-radius:10px;
    background:#16264c;border:1px solid #3a5aa0;white-space:nowrap;}
  .railbtn .tag.red{background:linear-gradient(#ff5a5a,#d62f2f);border-color:#ff8c8c;}
  .chestbar{width:60px;height:8px;border-radius:5px;background:#16264c;border:1px solid #3a5aa0;overflow:hidden;}
  .chestbar i{display:block;height:100%;background:linear-gradient(90deg,#ff5ad6,#b22fd6);}

  /* botão jogar + nav */
  #playwrap{position:absolute;left:0;right:0;bottom:calc(env(safe-area-inset-bottom) + 70px);z-index:8;
    display:flex;justify-content:center;pointer-events:none;}
  #playbtn{pointer-events:auto;min-width:184px;padding:13px 34px;border:none;border-radius:999px;position:relative;overflow:hidden;
    font-size:22px;font-weight:900;letter-spacing:1px;color:#fff;cursor:pointer;
    -webkit-text-stroke:3.5px #176312;paint-order:stroke fill;
    background:radial-gradient(44% 58% at 26% 22%,rgba(255,255,255,.55),rgba(255,255,255,0) 70%),linear-gradient(180deg,#84e05c 0%,#48c220 52%,#36a316 100%);
    box-shadow:inset 0 3px 5px rgba(255,255,255,.55),inset 0 -7px 12px rgba(0,0,0,.22),inset 0 0 0 2.5px #285a8f,0 0 0 4px #7cbef2,0 0 0 6px #3f86c8,0 13px 16px rgba(0,0,0,.42);
    text-shadow:0 2px 2px rgba(0,0,0,.22);}
  #playbtn::before{content:"";position:absolute;top:-60%;left:-100%;width:72%;height:220%;pointer-events:none;
    background:linear-gradient(100deg,rgba(255,255,255,0) 0%,rgba(255,255,255,.88) 50%,rgba(255,255,255,0) 100%);
    transform:skewX(-22deg);animation:btnShine 3.4s ease-in-out infinite;}
  @keyframes btnShine{0%{left:-100%;}18%{left:155%;}100%{left:155%;}}
  #playbtn:active{transform:translateY(2px);box-shadow:inset 0 2px 4px rgba(255,255,255,.5),inset 0 -5px 9px rgba(0,0,0,.25),inset 0 0 0 2.5px #285a8f,0 0 0 4px #7cbef2,0 0 0 6px #3f86c8,0 7px 11px rgba(0,0,0,.4);}
  #nav{position:absolute;left:12px;right:12px;bottom:calc(env(safe-area-inset-bottom) + 12px);z-index:8;height:64px;display:flex;align-items:stretch;justify-content:space-around;
    background:linear-gradient(180deg,#1c1f47,#111233);border-radius:30px;
    box-shadow:0 0 16px rgba(120,100,255,.5), 0 0 36px rgba(80,110,255,.32), 0 12px 28px rgba(0,0,0,.55), inset 0 1px 0 rgba(255,255,255,.07);}
  #nav::before{content:'';position:absolute;inset:0;border-radius:inherit;padding:2px;background:linear-gradient(135deg,#5b8cff 0%,#9b4dff 58%,#6a5dff 100%);-webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);-webkit-mask-composite:xor;mask-composite:exclude;pointer-events:none;}
  .navpill{position:absolute;left:50%;bottom:6px;transform:translateX(-50%);width:46px;height:8px;border-radius:5px;background:linear-gradient(90deg,#ff66d4,#cf38c6);box-shadow:0 0 10px rgba(255,90,210,.95),0 0 20px rgba(210,60,210,.6);pointer-events:none;}
  #nav .tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;padding:0;position:relative;-webkit-tap-highlight-color:transparent;}
  #nav .tab>svg,#nav .tab .navprof{transition:transform .16s ease;}
  #nav .tab:active>svg,#nav .tab:active .navprof{transform:scale(1.09);}
  #nav .tab::before{content:'';position:absolute;bottom:8px;width:7px;height:7px;border-radius:50%;background:rgba(150,168,220,.42);}
  #nav .tab.mid::before{display:none;}
  #nav .tab.mid::after{content:'';position:absolute;top:-30px;left:50%;transform:translateX(-50%);width:74px;height:74px;border-radius:50%;background:radial-gradient(circle,rgba(150,90,255,.4),transparent 70%);pointer-events:none;}
  #nav .tab.mid{position:relative;}
  #nav .tab.mid .home{position:absolute;top:-20px;width:62px;height:62px;border-radius:50%;
    background:radial-gradient(120% 120% at 50% 16%, #6184da 0%, #3a5db0 46%, #1d2b58 100%);border:3px solid #8aa6e6;display:flex;align-items:center;justify-content:center;
    box-shadow:0 8px 18px rgba(0,0,0,.5), 0 0 0 6px rgba(86,120,210,.20), 0 0 22px rgba(86,120,210,.35), inset 0 2px 5px rgba(255,255,255,.5), inset 0 -6px 11px rgba(0,0,0,.38);}

  /* =================== GAME =================== */
  #game{background:radial-gradient(120% 80% at 50% -10%, #20294a 0%, #0e1428 55%, #080b18 100%);
    display:none;flex-direction:column;}
  #game.on{display:flex;}
  #game::before{content:"";position:absolute;inset:0;opacity:.5;pointer-events:none;
    background-image:radial-gradient(circle at 10px 6px, rgba(255,255,255,.025) 1.5px, transparent 2px),
      radial-gradient(circle at 30px 23px, rgba(255,255,255,.025) 1.5px, transparent 2px);
    background-size:40px 34px;}
  #ghud{position:relative;z-index:2;padding:env(safe-area-inset-top) 10px 0;}
  #ghudbar{position:relative;display:flex;align-items:flex-start;gap:10px;margin-top:10px;padding:14px 12px 12px;border-radius:26px;
    background:linear-gradient(#2a4675,#16294c);border:2px solid #101f3c;box-shadow:inset 0 2px 0 rgba(255,255,255,.18),0 4px 0 rgba(0,0,0,.28),0 8px 16px rgba(0,0,0,.45);}
  .hleft{flex:1.55;display:flex;flex-direction:column;gap:7px;min-width:0;}
  .hright{flex:1;display:flex;flex-direction:column;gap:7px;min-width:0;}
  .hpanel{position:relative;background:linear-gradient(#1c2e54,#101d39);border:1px solid rgba(120,150,210,.30);border-radius:18px;padding:12px 10px 9px;min-height:60px;display:flex;align-items:center;justify-content:center;
    box-shadow:inset 0 2px 3px rgba(150,180,240,.18),inset 0 -3px 7px rgba(0,0,0,.45);}
  .hbadge{position:absolute;top:-13px;left:50%;transform:translateX(-50%);background:linear-gradient(#37a8e6,#1f7fd0);color:#fff;font-weight:900;font-size:14px;letter-spacing:.4px;
    padding:3px 15px;border-radius:13px;border:2px solid #fff;box-shadow:0 2px 4px rgba(0,0,0,.3);white-space:nowrap;text-shadow:0 1px 1px rgba(0,0,0,.28);}
  .hbox{display:flex;flex-wrap:wrap;gap:3px 10px;align-items:center;justify-content:center;width:100%;}
  .hbox-num{font-size:40px;font-weight:900;color:#dbe7ff;line-height:1;text-shadow:0 1px 3px rgba(0,0,0,.5);}
  .goal{position:relative;display:flex;align-items:center;gap:3px;}
  .goal .gicon{width:34px;height:34px;display:block;border-radius:8px;}
  .goal .gc{font-size:19px;font-weight:900;color:#dbe7ff;text-shadow:0 1px 2px rgba(0,0,0,.5);}
  .goal .gck{display:none;color:#5fe08a;font-weight:900;font-size:20px;}
  .goal.done .gck{display:block;} .goal.done .gc{display:none;}
  .htrack{position:relative;height:22px;margin:4px 10px 8px;border-radius:11px;background:#14264a;box-shadow:inset 0 2px 4px rgba(0,0,0,.45),inset 0 -1px 0 rgba(255,255,255,.08);}
  .htrackfill{height:100%;width:0;border-radius:11px;background:linear-gradient(#8fb0ff,#3f64d8);transition:width .35s;box-shadow:0 0 6px rgba(90,120,230,.6);}
  .hstar{position:absolute;top:50%;transform:translate(-50%,-50%);font-size:17px;line-height:1;color:#1a2c52;-webkit-text-stroke:1.4px #4a6ccf;paint-order:stroke fill;text-shadow:0 1px 1px rgba(0,0,0,.35);transition:.25s;pointer-events:none;}
  .hstar.on{color:#ffce33;-webkit-text-stroke:1.4px #99650f;transform:translate(-50%,-50%) scale(1.16);text-shadow:0 0 7px rgba(255,205,60,.85);}
  .hscore{background:linear-gradient(#1c2e54,#101d39);border:1px solid rgba(120,150,210,.30);border-radius:13px;padding:6px 10px;font-weight:800;color:#9fc0ff;font-size:13px;text-align:center;
    box-shadow:inset 0 1px 2px rgba(150,180,240,.16),inset 0 -2px 5px rgba(0,0,0,.4);}
  .hscore span{color:#ffffff;font-weight:900;font-size:16px;margin-left:4px;}
  .hpause{position:absolute;top:-8px;right:-2px;width:46px;height:46px;border-radius:15px;background:linear-gradient(#3aa6e8,#1f7fd0);border:2px solid #fff;
    box-shadow:0 3px 0 rgba(20,80,120,.6),0 5px 9px rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;gap:5px;cursor:pointer;z-index:3;}
  .hpause span{width:5px;height:17px;background:#fff;border-radius:3px;box-shadow:0 1px 1px rgba(0,0,0,.2);}
  #gboardwrap{flex:1;display:flex;align-items:center;justify-content:center;position:relative;z-index:1;}
  #gboard{position:relative;}
  #gboard canvas{display:block;background:transparent;}
  .toast{position:absolute;left:50%;top:46%;transform:translate(-50%,-50%) scale(.6);z-index:9;
    font-size:44px;font-weight:900;color:#fff;text-shadow:0 2px 10px #1a8cff,0 0 24px #1a8cff;opacity:0;pointer-events:none;font-style:italic;}
  #gdock{position:relative;z-index:2;display:flex;align-items:flex-end;gap:10px;padding:0 14px calc(env(safe-area-inset-bottom) + 12px);height:104px;}
  @keyframes pulse{50%{box-shadow:0 0 34px rgba(80,200,255,1),inset 0 -6px 12px rgba(0,0,0,.4);}}
  #slots{flex:1;display:flex;gap:8px;}
  .slot{position:relative;flex:1;height:64px;border-radius:16px;display:flex;flex-direction:column;gap:1px;align-items:center;justify-content:center;cursor:pointer;
    background:linear-gradient(#1b2848,#0e1730);border:1px solid rgba(120,150,210,.32);box-shadow:inset 0 3px 8px rgba(0,0,0,.62),inset 0 -1px 0 rgba(150,180,240,.12),0 2px 0 rgba(0,0,0,.3);}
  .slot.armed{border-color:#ffd24a;box-shadow:0 0 0 2px #ffd24a,0 0 16px rgba(255,210,74,.75),inset 0 3px 8px rgba(0,0,0,.5);}
  .slot .bic{width:34px;height:34px;filter:drop-shadow(0 1px 2px rgba(0,0,0,.5));}
  .slot .bpx{display:flex;align-items:center;gap:2px;font-size:12px;font-weight:900;color:#ffd98a;}
  .slot .bpx svg{width:13px;height:13px;}
  .slot svg{opacity:.5;}

  /* =================== LOJA =================== */
  #shop{position:absolute;inset:0;z-index:25;display:none;flex-direction:column;
    background:radial-gradient(120% 80% at 50% 0%, #14233f 0%, #0a1326 60%, #060a16 100%);}
  #shop.on{display:flex;}
  /* ===== RANKING ===== */
  #rank{position:absolute;inset:0;z-index:26;display:none;flex-direction:column;
    background:radial-gradient(120% 80% at 50% 0%, #14233f 0%, #0a1326 60%, #060a16 100%);}
  #rank.on{display:flex;}
  #rankhead{display:flex;align-items:center;justify-content:space-between;padding:calc(env(safe-area-inset-top) + 12px) 16px 8px;}
  #rankhead h2{margin:0;color:#fff;font-size:24px;font-weight:900;letter-spacing:2px;text-shadow:0 2px 4px rgba(0,0,0,.5);}
  #rankclose{width:44px;height:44px;border-radius:50%;background:linear-gradient(#54bcff,#1f86dd);border:2px solid #bfe4ff;
    display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 3px 8px rgba(0,0,0,.4);}
  #ranktabs{display:flex;gap:8px;padding:6px 12px 10px;}
  .rtab{flex:1;padding:11px 4px;border-radius:16px;border:1px solid rgba(120,150,210,.25);font-weight:900;font-size:13px;letter-spacing:.5px;cursor:pointer;
    background:linear-gradient(#1c2848,#141f3a);color:#9fb0cc;box-shadow:inset 0 1px 0 rgba(150,180,240,.12);transition:.15s;}
  .rtab.on{background:linear-gradient(#3aa0ee,#1f74cf);color:#fff;border-color:#bfe4ff;box-shadow:0 2px 8px rgba(40,140,230,.45),inset 0 1px 0 rgba(255,255,255,.4);}
  #rankbody{flex:1;overflow-y:auto;padding:4px 12px 20px;-webkit-overflow-scrolling:touch;}
  .rseasonbar{display:flex;align-items:center;justify-content:space-between;gap:8px;margin:4px 2px 12px;color:#cdddf5;font-size:13px;font-weight:700;}
  .rseasonbar b{color:#fff;}
  .rlast{background:linear-gradient(#37a8e6,#1f7fd0);color:#fff;border:none;border-radius:14px;padding:7px 12px;font-weight:800;font-size:11px;letter-spacing:.5px;cursor:pointer;box-shadow:0 2px 5px rgba(0,0,0,.35);white-space:nowrap;}
  .rrow{display:flex;align-items:center;gap:10px;padding:9px 12px;margin-bottom:9px;border-radius:18px;
    background:linear-gradient(#1c2e54,#101d39);border:1px solid rgba(120,150,210,.28);box-shadow:0 2px 6px rgba(0,0,0,.35);}
  .rrow.me{background:linear-gradient(#22386a,#16294c);border-color:#3f8fd0;box-shadow:0 0 0 1px rgba(63,143,208,.55),0 3px 8px rgba(0,0,0,.3);}
  @keyframes meGlow{0%,100%{box-shadow:0 0 0 1px rgba(120,190,255,.5),0 3px 8px rgba(0,0,0,.35);}50%{box-shadow:0 0 0 1px rgba(120,190,255,.85),0 0 14px rgba(95,168,238,.5),0 3px 8px rgba(0,0,0,.35);}}
  .rrow.me{animation:meGlow 2.2s ease-in-out infinite;}

<script>
(function(){
"use strict";

/* ================= persistência (com fallback em memória) ================= */
const mem={};
const store={
  get(k,d){try{const v=localStorage.getItem(k);return v==null?d:JSON.parse(v);}catch(e){return k in mem?mem[k]:d;}},
  set(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){mem[k]=v;}}
};
var _idbReq=null;
function _idbOpen(){if(_idbReq)return _idbReq;_idbReq=new Promise(function(res){try{if(!window.indexedDB)return res(null);var r=indexedDB.open('boopblast',1);r.onupgradeneeded=function(){try{r.result.createObjectStore('kv');}catch(e){}};r.onsuccess=function(){res(r.result);};r.onerror=function(){res(null);};}catch(e){res(null);}});return _idbReq;}
function idbSet(k,v){_idbOpen().then(function(db){if(!db)return;try{db.transaction('kv','readwrite').objectStore('kv').put(v,k);}catch(e){}});}
function idbGet(k){return _idbOpen().then(function(db){if(!db)return null;return new Promise(function(res){try{var rq=db.transaction('kv','readonly').objectStore('kv').get(k);rq.onsuccess=function(){res(rq.result||null);};rq.onerror=function(){res(null);};}catch(e){res(null);}});});}
const SAVE='cubeblast_save_v2';
let P=store.get(SAVE,{level:1,coins:100,lives:5,maxLives:5,stars:{},chest:0,chestGoal:10,lifeTs:Date.now()});
P.shopProg=P.shopProg||{}; if(P.noAds===undefined)P.noAds=false;
if(!P.lifeTs)P.lifeTs=Date.now();
(function(){var _def={level:1,coins:100,lives:5,maxLives:5,stars:{},chest:0,chestGoal:10,lifeTs:Date.now(),adProg:0,dailyStreak:0,achv:{},stats:{},daily:{day:'',s:{},c:{}},armHint:{},tips:{}};for(var k in _def){if(P[k]===undefined)P[k]=_def[k];}if(!P.ver){P.ver=2;}P.chestGoal=10;if((P.chest||0)>P.chestGoal)P.chest=P.chestGoal;save();})();
if(P.sfxOn===undefined)P.sfxOn=true; if(P.musicOn===undefined)P.musicOn=true;
function save(){store.set(SAVE,P);try{idbSet(SAVE,P);}catch(e){}}
document.addEventListener('visibilitychange',function(){if(document.hidden){try{save();}catch(e){}}});
window.addEventListener('pagehide',function(){try{save();}catch(e){}});
window.addEventListener('beforeunload',function(){try{save();}catch(e){}});
if(P.cc==null)P.cc=myCC();if(P.avatar==null)P.avatar=0;if(P.name==null)P.name='';save();
(function(){try{idbGet(SAVE).then(function(db){if(db&&(db.level||1)>(P.level||1)){for(var k in db)P[k]=db[k];try{store.set(SAVE,P);}catch(e){}try{activeLevel=P.level;}catch(e){}try{buildMap();}catch(e){}try{updateHomeHUD();}catch(e){}try{buildStars();}catch(e){}}else{try{idbSet(SAVE,P);}catch(e){}}}).catch(function(){});}catch(e){}})();

/* ================= troca de telas ================= */
const $=id=>document.getElementById(id);
function showScreen(name){
  $('home').classList.toggle('on',name==='home');
  $('game').classList.toggle('on',name==='game');
}

/* ================= HOME: estrelas de fundo (fixas, piscando) ================= */
function buildStars(){
  const svg=$('gears'); if(!svg) return;
  let s=0x9e3779b9>>>0; const rnd=()=>{s=(s+0x6D2B79F5)>>>0;let t=s;t=Math.imul(t^t>>>15,t|1);t^=t+Math.imul(t^t>>>7,t|61);return((t^t>>>14)>>>0)/4294967296;};
  let g='';
  for(let i=0;i<74;i++){
    const x=(rnd()*400).toFixed(1), y=(rnd()*800).toFixed(1);
    const dur=(2.4+rnd()*3.6).toFixed(2), delay=(rnd()*4.5).toFixed(2);
    const o=(0.55+rnd()*0.45).toFixed(2);
    const st=`animation-duration:${dur}s;animation-delay:${delay}s;--o:${o}`;
    if(rnd()<0.18){
      const L=(2.6+rnd()*2.4).toFixed(2), w=(+L*0.22).toFixed(2);
      g+=`<path class="star" style="${st}" transform="translate(${x} ${y})" d="M0 -${L} L ${w} -${w} L ${L} 0 L ${w} ${w} L 0 ${L} L -${w} ${w} L -${L} 0 L -${w} -${w} Z" fill="#eaf0ff"/>`;
    } else {
      const r=(0.7+rnd()*1.7).toFixed(2);
      g+=`<circle class="star" style="${st}" cx="${x}" cy="${y}" r="${r}" fill="#eef2ff"/>`;
    }
  }
  svg.innerHTML=g;
}

/* ================= HOME: trilha + nós ================= */
const ROW_SPACING=60;
let mapCap=500;            // total de fases no mapa (cresce sozinho perto do topo)
// 4 colunas fixas: FL(extrema esq) ML MR FR(extrema dir).
// Pares ocupam as 2 do meio (ML,MR); nos solitarios vao aos extremos (FR / FL, alternando).
// Periodo de 6 niveis -> 4 linhas. Sequencia: FR, MR, ML, FL, ML, MR (repete) = zigzag largo.
const XCOL  =[0.78,0.615,0.385,0.22,0.385,0.615]; // por k=(n-1)%6
const ROWOFF=[0,   1,   1,   2,   3,   3   ];
let nodePos=[]; // {x,y,level}
function nodeRC(n){const k=(n-1)%6, blk=Math.floor((n-1)/6); return {row:blk*4+ROWOFF[k], xf:XCOL[k]};}
function buildMap(){
  const inner=$('mapinner'), mapEl=$('map');
  while(P.level >= mapCap-200) mapCap+=500;   // chegou perto do topo -> +500 fases
  const W=mapEl.clientWidth, total=mapCap;
  const topPad=130, botPad=150;
  const rc=[]; let maxRow=0;
  for(let i=0;i<total;i++){const r=nodeRC(i+1); rc.push(r); if(r.row>maxRow)maxRow=r.row;}
  const H=topPad+botPad+maxRow*ROW_SPACING;
  inner.style.height=H+'px';
  const rowY=row=>H-botPad-row*ROW_SPACING;
  nodePos=[];
  for(let i=0;i<total;i++){nodePos.push({x:+(rc[i].xf*W).toFixed(1), y:+rowY(rc[i].row).toFixed(1), level:i+1});}
  // ESTRADA: curva suave (Catmull-Rom) por TRAS dos botoes (#road vem antes dos nos no DOM,
  // entao a esfera + base branca ficam por cima -> fita "entra" dentro dos botoes, igual a referencia)
  const road=$('road'); road.setAttribute('viewBox',`0 0 ${W} ${H}`); road.style.height=H+'px';
  let d='';
  if(nodePos.length){
    d='M '+nodePos[0].x+' '+nodePos[0].y;
    for(let i=0;i<nodePos.length-1;i++){
      const p0=nodePos[i-1]||nodePos[i], p1=nodePos[i], p2=nodePos[i+1], p3=nodePos[i+2]||nodePos[i+1];
      if(Math.abs(p2.y-p1.y)<0.5){ d+=' L '+p2.x+' '+p2.y; continue; }  // par na mesma linha -> reto horizontal
      const c1x=(p1.x+(p2.x-p0.x)/6).toFixed(1), c1y=(p1.y+(p2.y-p0.y)/6).toFixed(1);
      const c2x=(p2.x-(p3.x-p1.x)/6).toFixed(1), c2y=(p2.y-(p3.y-p1.y)/6).toFixed(1);
      d+=' C '+c1x+' '+c1y+' '+c2x+' '+c2y+' '+p2.x+' '+p2.y;
    }
  }
  road.innerHTML='<path d="'+d+'" fill="none" stroke="#2b245a" stroke-width="29" stroke-linecap="round" stroke-linejoin="round"/>'+
                 '<path d="'+d+'" fill="none" stroke="#514a8c" stroke-width="22" stroke-linecap="round" stroke-linejoin="round"/>';
    // limpa nós antigos
  inner.querySelectorAll('.node,.gift,#avatar').forEach(n=>n.remove());
  // nós
  nodePos.forEach((np,i)=>{
    const el=document.createElement('div'); el.className='node';
    el.style.left=np.x+'px'; el.style.top=np.y+'px';
    if(np.level<P.level) el.classList.add('done');
    else if(np.level===P.level) el.classList.add('next');
    else el.classList.add('locked');
    el.innerHTML='<div class="base"></div><div class="socket"></div><div class="lvtxt">'+np.level+'</div>';
    el.addEventListener('click',()=>{ if(np.level<=P.level) tryPlay(np.level); });
    inner.appendChild(el);
  });
  // avatar (mascote) no nó atual
  const ap=nodePos[P.level-1]||nodePos[0];
  const av=document.createElement('div'); av.id='avatar';
  av.style.left=ap.x+'px'; av.style.top=ap.y+'px';
  av.innerHTML=mascotSVG();
  inner.appendChild(av);
  // rola até o nível atual
  const target=ap.y-mapEl.clientHeight*0.6;
  mapEl.scrollTop=Math.max(0,target);
}

/* ================= 50 LAYOUTS DE TABULEIRO =================
   Cada def: [alinhamento, altura de cada uma das 7 colunas].
   align: 'b'=base, 'c'=centro, 't'=topo. Colunas contínuas e conectadas. */
const _RW=8;
const LAYOUT_DEFS=[
  ['c',8,8,8,8,8,8,8],   ['b',7,7,7,7,7,7,7],   ['c',6,8,8,8,8,8,6],   ['c',8,8,6,6,6,8,8],
  ['b',5,6,7,8,7,6,5],   ['b',4,5,6,7,6,5,4],   ['b',3,5,7,8,7,5,3],   ['b',2,4,6,8,6,4,2],   ['b',4,6,7,8,7,6,4],
  ['t',5,6,7,8,7,6,5],   ['t',4,5,6,7,6,5,4],   ['t',3,5,7,8,7,5,3],   ['t',4,6,7,8,7,6,4],
  ['c',4,6,8,8,8,6,4],   ['c',2,4,6,8,6,4,2],   ['c',4,6,6,8,6,6,4],   ['c',3,5,7,7,7,5,3],   ['c',5,7,8,8,8,7,5],
  ['c',4,4,8,8,8,4,4],   ['c',3,3,8,8,8,3,3],   ['c',4,8,8,8,8,8,4],   ['c',3,3,3,8,3,3,3],   ['c',5,5,8,8,8,5,5],   ['c',2,2,8,8,8,2,2],
  ['c',5,7,8,8,8,7,5],   ['c',4,6,7,7,7,6,4],   ['c',6,7,8,8,8,7,6],
  ['b',8,6,4,3,4,6,8],   ['b',7,5,4,4,4,5,7],   ['b',8,7,5,4,5,7,8],   ['b',6,5,4,3,4,5,6],
  ['t',8,6,4,3,4,6,8],   ['t',7,6,5,4,5,6,7],   ['t',8,7,5,4,5,7,8],
  ['b',3,4,5,6,7,8,8],   ['b',8,8,7,6,5,4,3],   ['b',4,5,6,7,8,7,6],
  ['b',4,7,4,7,4,7,4],   ['b',6,3,6,3,6,3,6],   ['b',7,4,7,4,7,4,7],   ['b',3,6,3,6,3,6,3],
  ['b',8,8,5,8,5,8,8],   ['b',8,5,8,8,8,5,8],   ['b',6,8,6,8,6,8,6],
  ['t',3,3,8,8,8,3,3],   ['t',3,8,8,8,8,8,3],
  ['b',3,3,8,8,8,3,3],   ['b',4,4,4,8,4,4,4],
  ['c',8,8,4,4,4,8,8],   ['c',8,8,3,5,3,8,8]
];
const LAYOUTS=LAYOUT_DEFS.map(d=>{const al=d[0],hs=d.slice(1);return hs.map(h=>{h=Math.max(0,Math.min(_RW,h));if(h<=0)return null;if(al==='t')return[0,h-1];if(al==='c'){const t=Math.floor((_RW-h)/2);return[t,t+h-1];}return[_RW-h,_RW-1];});});

/* Tabuleiros DIVIDIDOS (compartimentos isolados). Máscara: 8 linhas de 7 chars, '1'=ativo. */
const DIVIDED=[
  // 4 quadrantes 2x2
  ['1110111','1110111','1110111','0000000','1110111','1110111','1110111','1110111'],
  // duas metades verticais (esquerda/direita)
  ['1110111','1110111','1110111','1110111','1110111','1110111','1110111','1110111'],
  // duas metades horizontais (topo/base)
  ['1111111','1111111','1111111','0000000','1111111','1111111','1111111','1111111'],
  // tres faixas horizontais

];

/* Tabuleiro "taça": cheio em cima, com pernas-tubo embaixo (centro vazado) */
const CUP=['1111111','1111111','1111111','1111111','1111111','1001001','1001001','1001001'];

const PBASE=['1111111','1111111','1111111','1111111','1111111','1111111','0111110','0111110'];

/* Fases de objetivo variado (formatos novos + metas auto-contadas). kind: cross|fort|pyramid|diamond */
function _variedCfg(n,kind){
  var cu=Math.min(6,5+Math.floor(n/30)); // 5-6 cores
  var base={cols:7,rows:8,colorsUsed:cu,star2:6000+n*600,star3:11000+n*900};
  if(kind==='cross'){ // RESGATE: mascotes + lampadas + baloes (formato cruz)
    base.mask=M_PLUS; base.balloonFill=true; base.autoGoals=true; base.buddies=4;
    base.cellMap=['.......','..LLL..','..L.L..','..LLL..','..L.L..','..LLL..','.......','.......'];
    base.goals=[{collectible:true,need:4},{lamp:true,need:99},{balloon:true,need:99}];
    base.moves=48; return base;

function _lampCfg(n,mode){
  var cu=Math.min(6,4+Math.floor(n/6)),pal=[0,1,2,3,4,5];

    return {cols:7,rows:8,colorsUsed:cu,mask:FULL,cellMap:['.......','.......','..LLL..','..L.L..','..LLL..','..L.L..','..LLL..','.......'],balloonFill:true,autoGoals:true,goals:[{lamp:true,need:99},{balloon:true,need:99}],moves:48,star2:6000+n*600,star3:11000+n*900};
  }
  if(mode==='multi'){ // multi-objetivo: lampadas (centro) + baloes (bordas) + cor
    return {cols:7,rows:8,colorsUsed:cu,mask:FULL,cellMap:['B.....B','B.....B','B.LLL.B','B.LLL.B','B.LLL.B','B.....B','B.....B','B.....B'],autoGoals:true,goals:[{lamp:true,need:99},{balloon:true,need:99},{color:pal[0],need:16+Math.floor(n/4)}],moves:46,star2:6000+n*600,star3:11000+n*900};
  }
  if(mode==='bubbles'){ // cubos encapsulados em bolhas (combine pra estourar)
    return {cols:7,rows:8,colorsUsed:cu,mask:FULL,bubbleFill:true,autoGoals:true,goals:[{bubble:true,need:99},{color:pal[1],need:12+Math.floor(n/4)}],moves:34,star2:6000+n*600,star3:11000+n*900};
  }
  if(mode==='layers'){ // camadas: baloes (topo) + caixas (meio) + diamantes (base)
    return {cols:7,rows:8,colorsUsed:cu,mask:FULL,crateHp:1,cellMap:['BBBBBBB','B.....B','.CCCCC.','.CCCCC.','.......','.GGGGG.','.G...G.','.......'],autoGoals:true,goals:[{balloon:true,need:99},{solid:true,need:99},{gem:true,need:99}],moves:52,star2:6000+n*600,star3:11000+n*900};
  }
  if(mode==='gemrush'){ // garimpo: colunas de diamantes no centro + baloes nas bordas + cor
    return {cols:7,rows:8,colorsUsed:cu,mask:FULL,cellMap:['B..GG.B','B..GG.B','B..GG.B','B..GG.B','B..GG.B','B..GG.B','B..GG.B','B..GG.B'],autoGoals:true,goals:[{gem:true,need:99},{balloon:true,need:99},{color:pal[2],need:14+Math.floor(n/4)}],moves:54,star2:6000+n*600,star3:11000+n*900};
  }
  var lampN=mode==='block'?10:Math.min(9,5+Math.floor(n/12));
  var cfg={cols:7,rows:8,colorsUsed:cu,goals:[{lamp:true,need:lampN},{color:pal[n%cu],need:8+Math.floor(n/3)}],layout:LAYOUTS[0],star2:6000+n*600,star3:11000+n*900};
  if(mode==='block'){cfg.lampBlock=true;cfg.lampNeed=lampN;}else{cfg.lampScatter=lampN;}
  cfg.moves=Math.max(24,30-Math.floor(n/5))+lampN;
  return cfg;
}
function makeLevelCfg(n){
  // fases de objetivo variado (formatos novos) — referencias 40/46/47/50
  if(n===40)return _variedCfg(n,'pyramid');
  if(n===46)return _variedCfg(n,'cross');
  if(n===47)return _variedCfg(n,'fort');
  if(n===50)return _variedCfg(n,'diamond');
  if(n===53)return _variedCfg(n,'corridor');
  if(n===56)return _variedCfg(n,'gemcross');
  if(n===59)return _variedCfg(n,'twin');
  if(n===62)return _variedCfg(n,'lampfield');
  if(n===65)return _variedCfg(n,'woodframe');
  if(n===68)return _variedCfg(n,'crateboxes');
  if(n===71)return _variedCfg(n,'cratemix');
  if(n===74)return _variedCfg(n,'cratepets');
  if(n===77)return _variedCfg(n,'cratetower');
  if(n===80)return _variedCfg(n,'stairs');
  if(n===83)return _variedCfg(n,'cratemine');
  if(n===86)return _variedCfg(n,'treasure');
  if(n===89)return _variedCfg(n,'lampwood');
  if(n===92)return _variedCfg(n,'heartgem');
  if(n===95)return _variedCfg(n,'planes');
  // roteador da curva inicial (5-15): 1 mecanica nova a cada 2 fases, com fases simples no meio
  if(n>=5&&n<=15){
    if(n===10)return _lampCfg(10,'scatter');
    if(n===14)return _lampCfg(14,'block');
    var plain={6:1,8:1,12:1};
    var mechMap={5:5,7:7,9:6,11:8,13:9,15:10}; // fase real -> n que dispara a mecanica desejada
    if(plain[n]){
      var cu=Math.min(6,4+Math.floor(n/6)),pal=[0,1,2,3,4,5];
      var g=[{color:pal[n%cu],need:10+Math.floor(n/2)},{color:pal[(n+2)%cu],need:8+Math.floor(n/3)}];
      return {cols:7,rows:8,colorsUsed:cu,moves:Math.max(18,27-Math.floor(n/4)),goals:g,star2:6000+n*600,star3:11000+n*900};
    }
    if(mechMap[n]){var c=_baseLevelCfg(mechMap[n]);c.star2=6000+n*600;c.star3=11000+n*900;return c;}
  }
  if(n===16)return _lampCfg(16,'bubbles');
  if(n===18)return _lampCfg(18,'balloonsea');
  if(n===22)return _lampCfg(22,'multi');
  if(n===26)return _lampCfg(26,'layers');
  if(n===30)return _lampCfg(30,'gemrush');
  if(n>15&&n%12===0)return _lampCfg(n,['scatter','block','balloonsea','multi','layers','gemrush','bubbles'][Math.floor(n/12)%7]);
  return _baseLevelCfg(n);
}
function _baseLevelCfg(n){
  // --- abertura suave (fases 1-4): facil e gratificante p/ fisgar ---
  if(n<=4){var _cu=4,_pal=[0,1,2,3,4,5];var _g=[{color:_pal[(n-1)%_cu],need:8+n*2}];if(n>=3)_g.push({color:_pal[(n+1)%_cu],need:6+Math.floor(n/2)});return{cols:7,rows:8,colorsUsed:_cu,moves:31-n,goals:_g,star2:3500+n*500,star3:7000+n*800};}
  const colorsUsed=Math.min(6,4+Math.floor(n/6));
  const moves=Math.max(16, 26 - Math.floor(n/3));
  const palette=[0,1,2,3,4,5];
  const g1={color:palette[n%colorsUsed], need:10+Math.floor(n/2)};
  const goals=[g1];
  if(n>=2){goals.push({color:palette[(n+2)%colorsUsed], need:8+Math.floor(n/3)});}
  const cfg={cols:7, rows:8, colorsUsed, moves, goals, star2:6000+n*600, star3:11000+n*900};
  if(n%8===0){
    // fase MISTA: cor + balões + caixas, layout irregular
    cfg.layout=LAYOUTS[(n-1)%LAYOUTS.length];
    const nb=Math.min(7,4+Math.floor(n/6)),nc=Math.min(6,3+Math.floor(n/7));
    goals.push({balloon:true, need:nb});goals.push({solid:true, need:nc});
    cfg.balloons=nb;cfg.crates=nc;cfg.crateHp=(n>=24?2:1);cfg.moves+=9+(cfg.crateHp>1?nc:0);
  }else if(n%9===0){

    cfg.layout=LAYOUTS[0];cfg.gemBorder=true;const cnt=2*8+(7-2);
    goals.push({gem:true, need:cnt});cfg.moves+=Math.ceil(cnt*0.8);

  }else if(n%6===0){

    goals.push({balloon:true, need:cnt});cfg.balloonBlock=true;cfg.balloons=0;cfg.moves+=12;

    goals.push({solid:true, need:cnt});cfg.crateBlock=true;cfg.crateHp=(n>=21?2:1);cfg.moves+=14+(cfg.crateHp>1?cnt:0);

    goals.push({balloon:true, need:13});
    goals.push({solid:true, need:14});
    cfg.moves=50;
  }else{
    if(n%3===0){const need=Math.min(6, 2+Math.floor(n/6));goals.push({collectible:true, need});cfg.buddies=need;cfg.moves+=4;
      // a cada 2 fases de coleta pequena (n divisível por 6), adiciona caixas de 2 CAMADAS (dois combos pra cair)

    // fases de balão: estourar fazendo combinações ao lado (+ caixas avulsas em níveis altos)
    if(n%4===0){const need=Math.min(8, 3+Math.floor(n/5));goals.push({balloon:true, need});cfg.balloons=need;cfg.moves+=3;

  }

function cidiReportScore(score){
  score=score|0;

  var pend=P.scorePending||0;

  function fail(){_scoreBusy=false;dbgLog('score','FALHOU (fica pendente='+pend+')');}

// ---- Medal SDK (conquista unica): reivindica ao atingir o level alvo ----
var MEDAL_LEVEL=100; // condicao da medalha (ajuste aqui e no painel)
var _medalBusy=false;
// Reivindica a medalha de forma robusta: reconcilia com a plataforma (medalOwnership),
// faz retry com backoff, e marca P.medalPending se ainda nao confirmou (re-tenta depois).
function cidiClaimMedal(){
  if(P.medalDone)return;                         // ja confirmada
  var eligible=(P.level||1)>=MEDAL_LEVEL;
  if(!eligible && !P.medalPending)return;        // ainda nao cumpriu e nao ha pendencia
  if(eligible)P.medalPending=true;               // cumpriu: marca pendencia ate confirmar
  dbgLog('medal','elegivel='+eligible+' level='+(P.level||1)+'/'+MEDAL_LEVEL+' done='+(!!P.medalDone)+' pending='+(!!P.medalPending));
  if(_medalBusy)return; _medalBusy=true;
  var c=cidiClient();
  if(!c){_medalBusy=false;return;}
  function done(){P.medalDone=true;P.medalPending=false;save();_medalBusy=false;dbgLog('medal','OK medalha concedida');}
  function fail(){_medalBusy=false;dbgLog('medal','FALHOU (fica pendente)');}
  function claim(tries){
    dbgLog('medal','reivindicando medal()...');
    try{
      c.report.medal().then(done).catch(function(){
        if(tries>0)setTimeout(function(){claim(tries-1);},1500*(4-tries)); // backoff ~1.5/3/4.5s
        else fail();
      });
    }catch(e){fail();}
  }
  function start(){
    try{
      // reconcilia: se a plataforma ja tem, so marca local; senao reivindica
      dbgLog('medal','checando medalOwnership()...');
      c.report.medalOwnership().then(function(own){
        dbgLog('medal','ownership='+JSON.stringify(own));
        if(own&&own.owned){done();return;}
        claim(3);
      }).catch(function(e){ dbgLog('medal','ownership erro '+_dbgErr(e)); claim(3); });
    }catch(e){fail();}
  }
  if(_cidiLogged)start();
  else cidiLogin().then(function(ok){ if(ok)start(); else fail(); });
}

  async function reshuffle(animate,force){
    const isCube=t=>t&&!t.special&&!t.collectible&&!t.bigbud&&!t.budSlave&&!t.balloon&&!t.solid&&!t.gem&&t.color>=0;
    if(!force){if(anyMove())return;
    // ajuste MINIMO: achar um par de cubos vizinhos e igualar a cor (cria uma jogada sem mexer no resto)
    const pairs=[];
    for(let r=0;r<S.rows;r++)for(let c=0;c<S.cols;c++){const t=S.grid[r][c];if(!isCube(t))continue;
      const o1=(c+1<S.cols)?S.grid[r][c+1]:null;if(isCube(o1)&&o1.color!==t.color)pairs.push([t,o1]);
      const o2=(r+1<S.rows)?S.grid[r+1][c]:null;if(isCube(o2)&&o2.color!==t.color)pairs.push([t,o2]);}
    if(pairs.length){const p=pairs[Math.floor(Math.random()*pairs.length)];p[1].color=p[0].color;sfx('special');
      if(animate){p[1].scale=0.3;await tween(p[1],{scale:1.15},160);await tween(p[1],{scale:1},120);}return;}}
    // fallback (orb force, ou nenhum par vizinho): reembaralha tudo, com trava anti-loop
    const list=[];for(let r=0;r<S.rows;r++)for(let c=0;c<S.cols;c++){const t=S.grid[r][c];if(isCube(t))list.push(t);}
    if(list.length<2)return;let guard=0;
    do{for(let i=list.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));const tc=list[i].color;list[i].color=list[j].color;list[j].color=tc;}guard++;}while(!anyMove()&&guard<40);
    sfx('special');if(animate){const a=[];for(const t of list){t.scale=0.4;a.push(tween(t,{scale:1},220));}await Promise.all(a);}}

    await wait(850);toast.style.opacity='0';toast.style.transform='translate(-50%,-50%) scale(.6)';

  function tone(f,d,t,v){if(!P.sfxOn)return;const a=ac();if(!a)return;const o=a.createOscillator(),g=a.createGain();o.type=t||'sine';o.frequency.value=f;g.gain.setValueAtTime(v||0.12,a.currentTime);g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+d);o.connect(g);g.connect(a.destination);o.start();o.stop(a.currentTime+d);}

  function sfx(k,n){if(!P.sfxOn)return;

function openProfile(){
  var selCC=(P.cc||myCC()||'us').toLowerCase();
  var flagOpts=RK_CC.map(function(cc){return '<div class="pfflagopt'+(cc===selCC?' sel':'')+'" data-cc="'+cc+'">'+flag(cc)+'</div>';}).join('');
  showModal('<div class="profwrap"><div class="pfclose" id="pfclose"><svg width="20" height="20" viewBox="0 0 24 24"><path d="M6 6l12 12M18 6L6 18" stroke="#fff" stroke-width="3.4" stroke-linecap="round"/></svg></div><h2>PROFILE</h2><div class="pfsub">Your name and country</div>'+
    '<div class="pfprev" id="pfprev">'+profIcon()+'<span class="pfflag" id="pfprevflag">'+flag(selCC)+'</span></div>'+
    '<input id="pfname" class="pfname" maxlength="14" placeholder="Enter name" value="'+(P.name||'').replace(/"/g,'&quot;')+'">'+
    '<div class="pferr" id="pferr">At least 3 characters.</div>'+
    '<div class="pfcrow"><span>Country</span><span class="pfhint">tap to change</span></div>'+
    '<div class="pfflags" id="pfflags">'+flagOpts+'</div>'+
    '<button class="pfsave" id="pfsave">SAVE</button></div>', true);
  function renderPrev(){var pv=$('pfprev');if(pv)pv.innerHTML=profIcon()+'<span class="pfflag" id="pfprevflag">'+flag(selCC)+'</span>';}
  function markCC(){document.querySelectorAll('.pfflagopt').forEach(function(x){x.classList.toggle('sel',x.getAttribute('data-cc')===selCC);});}
  $('pfclose').addEventListener('click',hideModal);
  document.querySelectorAll('.pfflagopt').forEach(function(el){el.addEventListener('click',function(){
    selCC=el.getAttribute('data-cc');markCC();renderPrev();});});
  $('pfname').addEventListener('input',function(){if(($('pfname').value||'').trim().length>=3)$('pferr').classList.remove('show');});
  $('pfsave').addEventListener('click',function(){
    var nm=($('pfname').value||'').trim();
    if(nm.length<3){$('pferr').classList.add('show');return;}
    P.name=nm.slice(0,14);P.cc=selCC;save();updateProfBtn();if((P.bestScore||0)>0)sendScore();hideModal();});
}
let rankTab='global';
function rkName(r){return r()<0.5?('Guest'+(100000+Math.floor(r()*899999))):RK_NAMES[Math.floor(r()*RK_NAMES.length)];}
function genList(seed,n,top){const r=rk32(seed);const a=[];let sc=top;for(let i=0;i<n;i++){a.push({nm:rkName(r),tm:RK_TEAMS[Math.floor(r()*RK_TEAMS.length)],sc:Math.round(sc),lv:(r()<0.78?8600:300+Math.floor(r()*8200)),ei:Math.floor(r()*RK_EMB.length),cc:RK_CC[Math.floor(r()*RK_CC.length)]});sc-=180+r()*820;}return a;}
function rmedal(){return '<svg viewBox="0 0 24 24"><circle cx="12" cy="13" r="7" fill="#ffcf3f" stroke="#cf8410" stroke-width="1.3"/><path d="M9 3l3 5 3-5" stroke="#d63a8a" stroke-width="2.4" fill="none"/><circle cx="12" cy="13" r="3.4" fill="#f4b015"/></svg>';}
function rcup(pl){const c=pl===1?'#ffd14a':pl===2?'#d2dbe8':'#e0905a',sz=pl===1?54:44;return '<svg viewBox="0 0 48 48" width="'+sz+'" height="'+sz+'"><path d="M14 8h20v6a10 10 0 01-20 0z" fill="'+c+'" stroke="rgba(0,0,0,.25)"/><path d="M14 11H8v3a6 6 0 006 5M34 11h6v3a6 6 0 01-6 5" fill="none" stroke="'+c+'" stroke-width="3"/><rect x="21" y="25" width="6" height="8" fill="'+c+'"/><rect x="14" y="33" width="20" height="5" rx="2" fill="'+c+'"/><text x="24" y="17" font-size="8.5" font-weight="900" fill="#5a3a00" text-anchor="middle">#'+pl+'</text></svg>';}
function rankRow(p,rank){const cls=rank<=3?(' g'+rank):'',e=RK_EMB[p.ei];
  const rowcls=(!p.me&&rank<=3)?(' top'+rank):'';
  return '<div class="rrow'+(p.me?' me':'')+rowcls+'"><div class="rhex'+cls+'">'+rank+'</div>'+
    flag(p.cc)+
    '<div class="rname"><div class="nm">'+p.nm+'</div>'+(p.tm?'<div class="tm">'+p.tm+'</div>':'')+'</div>'+
    '<div class="rsc"><div class="lbl">SCORE</div><div class="val">'+rmedal()+p.sc.toLocaleString('en-US')+'</div></div>'+
    '<div class="rlv"><div class="lbl">LEVEL</div><div class="val">'+p.lv+'</div></div></div>';}
function playerEntry(){return {nm:P.name||'You',tm:'',sc:(P.bestScore||0),lv:P.level,cc:(P.cc||myCC()),me:true};}
var API_BASE=''; // mesmo deploy do jogo (api/ ao lado do index.html)
function getUid(){if(!P.uid){P.uid='u_'+Date.now().toString(36)+Math.random().toString(36).slice(2,10);save();}return P.uid;}
function sendScore(){var lv=P.level||1,sc=P.bestScore||0;dbgLog('rank','enviando ao ranking lv='+lv+' sc='+sc);try{fetch(API_BASE+'/api/score',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({uid:getUid(),name:P.name||'Player',cc:P.cc||myCC(),level:lv,score:sc}),keepalive:true}).then(function(r){dbgLog('rank',(r&&r.ok)?('OK ranking salvo (HTTP '+r.status+')'):('resposta HTTP '+(r?r.status:'?')));}).catch(function(e){dbgLog('rank','FALHOU '+_dbgErr(e));});}catch(e){dbgLog('rank','EXCECAO '+_dbgErr(e));}}
function _monthLabel(m){try{var p=String(m).split('-');var mn=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][(+p[1])-1];return mn+' '+p[0];}catch(e){return m;}}
function _countdown(endsAt){var ms=endsAt-Date.now();if(ms<0)ms=0;var d=Math.floor(ms/86400000),hh=Math.floor((ms%86400000)/3600000);return d+'d '+hh+'h';}
function renderRank(){var body=$('rankbody');if(!body)return;body.scrollTop=0;body.innerHTML='<div class="rkloading">Loading\u2026</div>';
  if(rankTab==='hall'){
    fetch(API_BASE+'/api/hall').then(function(r){return r.json();}).then(function(d){
      var seasons=(d&&d.seasons)||[];
      if(!seasons.length){body.innerHTML='<div class="rkempty">No seasons archived yet.</div>';return;}
      var hh='';
      seasons.forEach(function(se){var pod=se.podium||[];
        hh+='<div class="rhseason">'+_monthLabel(se.month)+'</div><div class="rpodium">';
        [1,0,2].forEach(function(idx){var p=pod[idx];if(!p)return;var pl=idx+1;
          hh+='<div class="rpcard'+(pl===1?' first':'')+'"><div class="cup">'+rcup(pl)+'</div><div class="pnm">'+(p.name||'Player')+'</div><div class="psc">'+(Number(p.sc)||0).toLocaleString('en-US')+'</div></div>';});
        hh+='</div>';});
      body.innerHTML=hh;
    }).catch(function(){body.innerHTML='<div class="rkempty">Could not load Hall of Fame.</div>';});
    return;
  }
  var myUid=getUid();
  fetch(API_BASE+'/api/leaderboard?uid='+encodeURIComponent(myUid)).then(function(r){return r.json();}).then(function(d){
    var entries=(d&&d.entries)||[];var me=d&&d.me;var endsAt=d&&d.endsAt;
    var hh='<div class="rseasonbar"><span>This season ends in: <b>'+(endsAt?_countdown(endsAt):'\u2014')+'</b></span><button class="rlast" id="rkLast">LAST SEASON</button></div>';
    if(!entries.length){hh+='<div class="rkempty">No scores yet \u2014 play a level to enter the ranking!</div>';}
    entries.forEach(function(e,i){hh+=rankRow({nm:e.name,cc:e.cc,sc:Number(e.sc)||0,lv:Number(e.lv)||1,me:e.uid===myUid},i+1);});
    if(me&&!entries.some(function(e){return e.uid===myUid;})){hh+='<div class="rkmesep">YOUR RANK</div>'+rankRow({nm:P.name||'You',cc:P.cc||myCC(),sc:Number(me.sc)||0,lv:Number(me.lv)||1,me:true},me.rank);}
    body.innerHTML=hh;
    var lb=$('rkLast');if(lb)lb.onclick=function(){rankTab='hall';syncRankTabs();renderRank();};
  }).catch(function(){body.innerHTML='<div class="rkempty">Could not load ranking.</div>';});
}
function syncRankTabs(){document.querySelectorAll('.rtab').forEach(b=>b.classList.toggle('on',b.dataset.r===rankTab));}
function openRank(){rankTab='global';syncRankTabs();renderRank();$('rank').classList.add('on');}
document.querySelectorAll('.rtab').forEach(b=>b.addEventListener('click',()=>{rankTab=b.dataset.r;syncRankTabs();renderRank();}));

/* ================= RECOMPENSA DIARIA (streak) ================= */
var DAILY=[50,75,100,150,200,300,500];
function _ymd(off){var d=new Date(Date.now()-(off||0)*86400000);return ''+d.getFullYear()+String(d.getMonth()+1).padStart(2,'0')+String(d.getDate()).padStart(2,'0');}
function dailyClaimable(){return P.dailyDay!==_ymd(0);}
function dailyTodayN(){ if(P.dailyDay===_ymd(1)) return Math.min(7,(P.dailyStreak||0)+1); return 1; }
function updateDailyBtn(){var b=$('dailyBtn');if(b)b.classList.toggle('hasgift',dailyClaimable());}
function openDaily(){
  var claim=dailyClaimable();
  var sN=claim?dailyTodayN():(P.dailyStreak||1);
  var cards='';
  for(var i=1;i<=7;i++){
    var cls=''; if(i<sN)cls='got'; else if(i===sN&&claim)cls='today'; else if(i<=sN&&!claim)cls='got';
    cards+='<div class="dcard '+cls+(i===7?' mega':'')+'"><div class="dday">DAY '+i+'</div>'+coinIco(i===7?24:20)+'<div class="damt">+'+DAILY[i-1]+'</div>'+((cls==='got')?'<div class="dchk">\u2713</div>':'')+'</div>';
  }
  showModal('<div class="dailywrap"><div class="dlx" id="dlx"><svg width="18" height="18" viewBox="0 0 24 24"><path d="M6 6l12 12M18 6L6 18" stroke="#fff" stroke-width="3.4" stroke-linecap="round"/></svg></div><h2>DAILY REWARD</h2><div class="dgrid">'+cards+'</div>'+(claim?('<button class="btn green" id="dlclaim">CLAIM &middot; +'+DAILY[sN-1]+'</button>'):'<div class="dnote">Come back tomorrow!</div>')+'</div>',true);
  $('dlx').onclick=hideModal;
  if(claim)$('dlclaim').onclick=function(){P.coins=(P.coins||0)+DAILY[sN-1];P.dailyStreak=sN;P.dailyDay=_ymd(0);save();updateHomeHUD();updateDailyBtn();hideModal();};
}

var DACHV=[
 {id:'d_ad',t:'Ad Watcher',d:'Watch 5 shop ads today',ic:'📺',goal:5,rw:120,val:function(){_ensureDay();return P.daily.s.ads||0;}},
 {id:'d_win',t:'Daily Winner',d:'Win 3 levels today',ic:'🎯',goal:3,rw:30,val:function(){_ensureDay();return P.daily.s.wins||0;}},

function achUnlocked(a){return a.val()>=a.goal;}
function achvClaimable(){_ensureDay();var n=0,i;for(i=0;i<ACHV.length;i++){if(achUnlocked(ACHV[i])&&!(P.achv&&P.achv[ACHV[i].id]))n++;}for(i=0;i<DACHV.length;i++){if(DACHV[i].val()>=DACHV[i].goal&&!(P.daily.c&&P.daily.c[DACHV[i].id]))n++;}return n;}
function updateAchvBtn(){var b=$('achvBtn');if(!b)return;var n=achvClaimable();var bd=b.querySelector('.abadge');if(n>0){if(!bd){bd=document.createElement('div');bd.className='abadge';b.appendChild(bd);}bd.textContent=n;b.classList.add('hasclaim');}else{if(bd)bd.remove();b.classList.remove('hasclaim');}}
function claimAchvDo(id){var a=null,i;for(i=0;i<ACHV.length;i++)if(ACHV[i].id===id)a=ACHV[i];if(!a||!achUnlocked(a)||(P.achv&&P.achv[id]))return;P.achv=P.achv||{};P.achv[id]=true;P.coins=(P.coins||0)+a.rw;save();updateHomeHUD();updateAchvBtn();openAchv();}
var _achTab='main';
function _achRowsHTML(list,cmap){var rows='',i;for(i=0;i<list.length;i++){var a=list[i],v=a.val(),un=v>=a.goal,cl=!!(cmap&&cmap[a.id]),pct=Math.min(100,Math.round(v/a.goal*100));rows+='<div class="achv'+(un?' done':'')+'"><div class="aic">'+a.ic+'</div><div class="amid"><div class="atit">'+a.t+'</div><div class="adesc">'+a.d+'</div><div class="abar"><i style="width:'+pct+'%"></i></div><div class="aprog">'+Math.min(v,a.goal)+' / '+a.goal+'</div></div><div class="aside">'+(cl?'<div class="achk">✓</div>':(un?'<button class="btn green abtn" data-aid="'+a.id+'">+'+a.rw+'</button>':'<div class="arew">+'+a.rw+'</div>'))+'</div></div>';}return rows;}
function claimDailyDo(id){_ensureDay();var a=null,i;for(i=0;i<DACHV.length;i++)if(DACHV[i].id===id)a=DACHV[i];if(!a||a.val()<a.goal||(P.daily.c&&P.daily.c[id]))return;P.daily.c=P.daily.c||{};P.daily.c[id]=true;P.coins=(P.coins||0)+a.rw;save();updateHomeHUD();updateAchvBtn();openAchv();}
function openAchv(){_ensureDay();var main=_achTab!=='daily';var list=main?ACHV:DACHV;var cmap=main?(P.achv||{}):(P.daily.c||{});var rows=_achRowsHTML(list,cmap);
showModal('<div class="achwrap"><div class="dlx" id="achx"><svg width="18" height="18" viewBox="0 0 24 24"><path d="M6 6l12 12M18 6L6 18" stroke="#fff" stroke-width="3.4" stroke-linecap="round"/></svg></div><div class="achtabs"><button class="atab'+(main?' on':'')+'" data-t="main">🏆 Trophies</button><button class="atab'+(main?'':' on')+'" data-t="daily">📅 Daily</button></div>'+(main?'':'<div class="adnote">Resets every day at midnight</div>')+'<div class="achlist">'+rows+'</div></div>',true);
$('achx').onclick=hideModal;var i,tb=document.querySelectorAll('.atab');for(i=0;i<tb.length;i++){tb[i].onclick=function(){_achTab=this.getAttribute('data-t');openAchv();};}var bts=document.querySelectorAll('.achv .abtn');for(i=0;i<bts.length;i++){bts[i].onclick=function(){var id=this.getAttribute('data-aid');if(main)claimAchvDo(id);else claimDailyDo(id);};}}
function _dayKey(){var d=new Date();return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate();}
function _ensureDay(){if(!P.daily||P.daily.day!==_dayKey()){P.daily={day:_dayKey(),s:{},c:{}};}}
function incStat(k){P.stats=P.stats||{};P.stats[k]=(P.stats[k]||0)+1;_ensureDay();P.daily.s[k]=(P.daily.s[k]||0)+1;}
function maxStat(k,v){P.stats=P.stats||{};P.stats[k]=Math.max(P.stats[k]||0,v);_ensureDay();P.daily.s[k]=Math.max(P.daily.s[k]||0,v);}
/* ================= BAU / COFRE ================= */
function updateChestBtn(){var b=$('chestBtn');if(!b)return;var f=$('chestFill');if(f)f.style.width=Math.round((P.chest||0)/P.chestGoal*100)+'%';b.classList.toggle('ready',(P.chest||0)>=P.chestGoal);}
function _grantChest(){incStat('chestsOpened');P.coins=(P.coins||0)+250;P.chest=0;save();updateHomeHUD();updateChestBtn();var w=document.querySelector('.chestwrap');if(w){w.innerHTML='<h2>+250 '+coinIco(22)+'</h2><div class="dnote">Chest opened!</div>';}setTimeout(hideModal,1300);}
function openChest(){
  var full=(P.chest||0)>=P.chestGoal;var pct=Math.round((P.chest||0)/P.chestGoal*100);
  var chSvg='<svg viewBox="0 0 32 32"><path d="M5 13 q11 -7 22 0 l0 4 q-11 -6 -22 0 z" fill="#8fb0cc"/><rect x="5" y="16" width="22" height="11" rx="2" fill="#9c3550"/><rect x="5" y="16" width="22" height="4" fill="#b8455f"/><rect x="14" y="19" width="4" height="6" rx="1" fill="#ffd24a"/></svg>';
  showModal('<div class="chestwrap"><div class="dlx" id="chx"><svg width="18" height="18" viewBox="0 0 24 24"><path d="M6 6l12 12M18 6L6 18" stroke="#fff" stroke-width="3.4" stroke-linecap="round"/></svg></div><h2>TREASURE CHEST</h2><div class="chbig">'+chSvg+'</div><div class="chestbar big"><i style="width:'+pct+'%"></i></div><div class="chptxt">'+(P.chest||0)+' / '+P.chestGoal+' wins</div>'+(full?('<button class="btn green" id="chclaim">OPEN &middot; +250 '+coinIco(18)+'</button>'):('<button class="btn ad" id="chad">\u25B6 Open now &middot; +250 '+coinIco(18)+'</button><div class="adhint">Or win '+(P.chestGoal-(P.chest||0))+' more to open free</div>'))+'</div>',true);
  $('chx').onclick=hideModal;
  if(full){$('chclaim').onclick=function(){_grantChest();};}
  else{$('chad').onclick=function(){showRewardedAd(function(ok){if(ok)_grantChest();});};}
}
/* ================= VIDAS (regeneração + modal) ================= */
const REGEN_MS=20*60*1000, REFILL_COST=50;
let lifeInt=null;
function regenCheck(){const now=Date.now();if(!P.lifeTs)P.lifeTs=now;
  if(P.lives>=P.maxLives){P.lifeTs=now;save();return;}
  while(now-P.lifeTs>=REGEN_MS&&P.lives<P.maxLives){P.lives++;P.lifeTs+=REGEN_MS;}
  if(P.lives>=P.maxLives)P.lifeTs=now;save();}
function timeToNext(){if(P.lives>=P.maxLives)return 0;return Math.max(0,REGEN_MS-(Date.now()-P.lifeTs));}
function fmtT(ms){const s=Math.ceil(ms/1000),m=Math.floor(s/60),ss=s%60;return (m<10?'0':'')+m+':'+(ss<10?'0':'')+ss;}
function heartBig(){return '<svg viewBox="0 0 100 96"><defs><radialGradient id="hbg" cx="38%" cy="28%" r="78%"><stop offset="0" stop-color="#ff9ec9"/><stop offset="55%" stop-color="#ee3d86"/><stop offset="1" stop-color="#c41f63"/></radialGradient></defs><path d="M50 88C12 58 6 32 22 20 35 10 47 16 50 28 53 16 65 10 78 20 94 32 88 58 50 88Z" fill="url(#hbg)"/><ellipse cx="36" cy="33" rx="13" ry="8" fill="#ffd0e6" opacity=".85"/><circle cx="29" cy="74" r="14" fill="#ff6aa8" stroke="#fff" stroke-width="3"/><path d="M29 67v14M22 74h14" stroke="#fff" stroke-width="3.6" stroke-linecap="round"/></svg>';}
function heartBroken(){return '<svg viewBox="0 0 100 96"><defs><radialGradient id="hbg2" cx="38%" cy="28%" r="78%"><stop offset="0" stop-color="#ff9ec9"/><stop offset="55%" stop-color="#ee3d86"/><stop offset="1" stop-color="#c41f63"/></radialGradient></defs><path d="M50 88C12 58 6 32 22 20 35 10 47 16 50 28 53 16 65 10 78 20 94 32 88 58 50 88Z" fill="url(#hbg2)"/><path d="M50 28 L42 44 L55 54 L44 68 L52 88" fill="none" stroke="#9c0f3e" stroke-width="5" stroke-linejoin="round" stroke-linecap="round"/><path d="M50 28 L42 44 L55 54 L44 68 L52 88" fill="none" stroke="#ffd0e6" stroke-width="1.6" stroke-linejoin="round" stroke-linecap="round"/><ellipse cx="34" cy="33" rx="11" ry="7" fill="#ffd0e6" opacity=".8"/><circle cx="29" cy="74" r="14" fill="#ff6aa8" stroke="#fff" stroke-width="3"/><path d="M29 67v14M22 74h14" stroke="#fff" stroke-width="3.6" stroke-linecap="round"/></svg>';}
function heartMini(){return '<svg width="20" height="20" viewBox="0 0 24 24"><path d="M12 21C4 15 2 10 5 7c2-2 5-1 7 2 2-3 5-4 7-2 3 3 1 8-7 14z" fill="#ff5a8a" stroke="#fff" stroke-width="1.2"/></svg>';}
function openLives(){
  regenCheck();
  showModal('<div class="gpanel"><div class="ghead"><h2>'+(P.lives<=0?'OUT OF LIVES':'MORE LIVES?')+'</h2><div class="x" id="lvX"><svg width="22" height="22" viewBox="0 0 24 24"><path d="M6 6l12 12M18 6L6 18" stroke="#fff" stroke-width="3.4" stroke-linecap="round"/></svg></div></div>'+
    '<div class="gbody">'+
    '<div class="lifebanner"><div class="bh">'+(P.lives<=0?heartBroken():heartBig())+'</div><div class="nx" id="lvNext"></div></div>'+
    '<button class="btn green" id="refill">REFILL '+coinIco(22)+' '+REFILL_COST+'</button>'+
    '</div></div>', true);
  renderLifeNext();
  $('lvX').onclick=()=>{stopLifeTimer();hideModal();};
  $('refill').onclick=refillLives;
  startLifeTimer();
}
function renderLifeNext(){const el=$('lvNext');if(!el)return;
  if(P.lives>=P.maxLives)el.innerHTML='<span>LIVES</span><b>FULL</b>';
  else el.innerHTML='<span>NEXT IN</span><b>'+fmtT(timeToNext())+'</b>';
  const rf=$('refill');if(rf)rf.disabled=(P.lives>=P.maxLives);}
function startLifeTimer(){stopLifeTimer();lifeInt=setInterval(()=>{regenCheck();updateHomeHUD();renderLifeNext();},1000);}
function stopLifeTimer(){if(lifeInt){clearInterval(lifeInt);lifeInt=null;}}
function refillLives(){if(P.lives>=P.maxLives)return;
  if((P.coins||0)<REFILL_COST){stopLifeTimer();hideModal();openShop();return;}
  P.coins-=REFILL_COST;P.lives=P.maxLives;P.lifeTs=Date.now();save();updateHomeHUD();renderLifeNext();}
$('livesPill').addEventListener('click',openLives);
$('rankBtn').addEventListener('click',openRank);
$('dailyBtn').addEventListener('click',openDaily);
$('chestBtn').addEventListener('click',openChest);
$('achvBtn').addEventListener('click',openAchv);
$('dbgBtn').addEventListener('click',openDebug);
if(P.cc==null){P.cc=(myCC()||'us').toLowerCase();save();}
updateProfBtn();
try{cidiLogin().then(function(){try{cidiClaimMedal();}catch(e){}try{if((P.scorePending||0)>(P.scoreSent||0))cidiReportScore(P.scorePending);}catch(e){}try{cidiReportTask();}catch(e){}});}catch(e){}

/* ================= boot ================= */
function runSplash(){const bar=$('spBar'),pct=$('spPct'),sp=$('splash');if(!sp||!bar)return;let p=0;
  const tick=()=>{p+=Math.random()*9+4;
    if(p>=100){p=100;bar.style.width='100%';pct.textContent='100%';
      if(P.musicOn)Game.musicStart(); // tenta abrir a musica ao chegar em 100% (home)
      setTimeout(()=>{sp.classList.add('hide');setTimeout(()=>{sp.style.display='none';},560);},300);return;}
    bar.style.width=p.toFixed(0)+'%';pct.textContent=Math.floor(p)+'%';setTimeout(tick,120+Math.random()*100);};
  setTimeout(tick,260);}
function init(){regenCheck();buildStars();buildMap();updateHomeHUD();updateDailyBtn();setInterval(()=>{regenCheck();updateHomeHUD();updateDailyBtn();},10000);setInterval(()=>{regenCheck();updateHomeHUD();},1000);runSplash();setTimeout(function(){if(dailyClaimable())openDaily();},2200);}
window.addEventListener('resize',()=>{if($('home').classList.contains('on')){buildMap();}});
init();
{var _mStart=function(){if(P.musicOn)Game.musicStart();window.removeEventListener('pointerdown',_mStart);window.removeEventListener('touchstart',_mStart);};window.addEventListener('pointerdown',_mStart);window.addEventListener('touchstart',_mStart);}

})();
